services:
  db:
    image: postgres:16-alpine
    container_name: devlog-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devlog_manager_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-secret-used-only-for-local-example}
      POSTGRES_DB: ${POSTGRES_DB:-devlog_manager}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-devlog_manager_app} -d $${POSTGRES_DB:-devlog_manager}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: devlog-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8787}
      DATABASE_URL: ${DATABASE_URL:-postgresql://devlog_manager_app:dev-secret-used-only-for-local-example@db:5432/devlog_manager?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "8787:8787"
    volumes:
      - api_uploads:/app/apps/api/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8787/api}
    container_name: devlog-web
    restart: always
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:
